services:
  mongodb:
    image: mongo:6.0
    container_name: compiler_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - compiler_network
    restart: unless-stopped

  backend:
    image: compiler_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compiler_backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads_data:/app/uploads
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=30
      - BREVO_SMTP_HOST=${BREVO_SMTP_HOST}
      - BREVO_SMTP_PORT=${BREVO_SMTP_PORT}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BREVO_SMTP_PASSWORD=${BREVO_SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - compiler_network
    restart: unless-stopped

  frontend:
    image: compiler_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compiler_frontend
    environment:
      - VITE_API_URL=http://localhost/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - compiler_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: compiler_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - compiler_network
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:

networks:
  compiler_network:
    driver: bridge
